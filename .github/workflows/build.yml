name: Build

on:
  push:
  pull_request:
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Linux 64-bit
          - os: ubuntu-latest
            arch: x64
            cmake_args: ""

          # Linux 32-bit
          - os: ubuntu-latest
            arch: x86
            cmake_args: "-DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32"

          # Windows 64-bit
          - os: windows-latest
            arch: x64
            cmake_args: "-A x64"

          # Windows 32-bit
          - os: windows-latest
            arch: x86
            cmake_args: "-A Win32"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux 32-bit deps
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x86'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-multilib

      - name: Configure
        run: cmake -B build ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Rename binary
        run: |
          mkdir out
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp build/hello out/hello-${{ matrix.os }}-${{ matrix.arch }}
          else
            cp build/Release/hello.exe out/hello-${{ matrix.os }}-${{ matrix.arch }}.exe
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: hello-${{ matrix.os }}-${{ matrix.arch }}
          path: out/*